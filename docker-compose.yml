services:
  postgres:
    image: postgres:16-alpine
    container_name: kinkin_pgh_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kinkin_pgh
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kinkin_pgh"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
